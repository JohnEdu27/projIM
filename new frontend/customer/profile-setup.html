<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campus Canteen Grab - Setup Profile</title>
  <!-- links the profile setup css -->
  <link rel="stylesheet" href="../FrontendDesigns/profile-setup.css">
</head>
<body>

  <div class="profile-wrapper">
    <div class="profile-card">

      <!-- mascot logo -->
      <img src="../images/mascot.png" alt="logo" class="profile-logo">

      <!-- heading -->
      <h1>Almost there!</h1>
      <p class="profile-subtitle">Fill out your profile to continue.</p>

      <!-- profile form -->
      <form id="profileForm">

        <!-- full name -->
        <label for="fullname">Full Name *</label>
        <input type="text" id="fullname" placeholder="Enter your full name" required>
        <span class="error" id="fullnameError"></span>

        <!-- student ID -->
        <label for="studentId">Student ID *</label>
        <input type="text" id="studentId" placeholder="e.g. 2023-0001" required>
        <span class="error" id="studentIdError"></span>

        <!-- save button -->
        <button type="submit" id="saveBtn">SAVE & CONTINUE</button>

      </form>

    </div>
  </div>

  <!-- links the profile setup js -->
  <script src="profile-setup.js"></script>

</body>
</html>
