<!DOCTYPE html>
<!-- tells the browser this is an HTML5 document -->
<html lang="en">
<head>
  <!-- supports all characters and symbols -->
  <meta charset="UTF-8">
  <!-- makes the page look good on mobile screens -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- text shown on the browser tab -->
  <title>Admin - Menu</title>
  <!-- links the admin CSS file for styling -->
  <link rel="stylesheet" href="../FrontendDesigns/admin.css">
</head>
<body>

  <!-- sidebar navigation on the left side -->
  <div class="sidebar">

    <!-- logo and app name at the top of sidebar -->
    <div class="sidebar-logo">
      <img src="../images/mascot.png" alt="logo">
      <span>CCG Admin</span>
    </div>

    <!-- navigation links -->
    <nav class="sidebar-nav">
      <!-- dashboard link - goes to dashboard page -->
      <a href="dashboard.html" class="nav-item">📊 Dashboard</a>
      <!-- menu link - active because we are on this page -->
      <a href="menu.html" class="nav-item active">🍽️ Menu</a>
      <!-- customers link - goes to customers page -->
      <a href="customers.html" class="nav-item">👥 Customers</a>
    </nav>

    <!-- logout button at the bottom of sidebar -->
    <button class="sidebar-logout" id="logoutBtn">🚪 Logout</button>

  </div>

  <!-- main content area on the right side -->
  <div class="admin-main">

    <!-- top bar with page title and user info -->
    <div class="topbar">
      <h1>Menu Management</h1>
      <!-- admin profile photo and name - filled by menu.js -->
      <div class="topbar-user">
        <img id="userPhoto" src="" alt="profile">
        <span id="userName">Loading...</span>
      </div>
    </div>

    <!-- add new product form card -->
    <div class="admin-card">
      <h2>Add New Product</h2>

      <!-- form to add a new product - handled by menu.js -->
      <form id="addProductForm" class="admin-form">

        <!-- three input fields in one row -->
        <div class="form-row">

          <!-- product name input -->
          <div class="form-group">
            <label>Product Name</label>
            <input type="text" id="productName" placeholder="e.g. Chicken Rice" required>
          </div>

          <!-- price input - number only -->
          <div class="form-group">
            <label>Price (₱)</label>
            <input type="number" id="productPrice" placeholder="e.g. 55" required>
          </div>

          <!-- quantity input - number only -->
          <div class="form-group">
            <label>Quantity</label>
            <input type="number" id="productQty" placeholder="e.g. 10" required>
          </div>

        </div>

        <!-- submit button to add the product -->
        <button type="submit" class="admin-btn">Add Product</button>

      </form>
    </div>

    <!-- all products table card -->
    <div class="admin-card">
      <h2>All Products</h2>

      <!-- table showing all products -->
      <table class="admin-table">
        <thead>
          <!-- column headers -->
          <tr>
            <th>ID</th>
            <th>Product Name</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Actions</th>
          </tr>
        </thead>
        <!-- tbody is empty - menu.js fills this with product rows -->
        <tbody id="productsTable">
        </tbody>
      </table>
    </div>

  </div>

  <!-- edit product modal - hidden by default, shown when edit is clicked -->
  <div class="modal" id="editModal" style="display:none;">
    <div class="modal-card">
      <h2>Edit Product</h2>

      <!-- edit form - handled by menu.js -->
      <form id="editProductForm" class="admin-form">

        <!-- hidden input stores the product ID being edited -->
        <input type="hidden" id="editProductId">

        <!-- edit product name -->
        <div class="form-group">
          <label>Product Name</label>
          <input type="text" id="editProductName" required>
        </div>

        <!-- edit price -->
        <div class="form-group">
          <label>Price (₱)</label>
          <input type="number" id="editProductPrice" required>
        </div>

        <!-- edit quantity -->
        <div class="form-group">
          <label>Quantity</label>
          <input type="number" id="editProductQty" required>
        </div>

        <!-- modal action buttons -->
        <div class="modal-buttons">
          <!-- saves the edited product -->
          <button type="submit" class="admin-btn">Save Changes</button>
          <!-- closes the modal without saving -->
          <button type="button" class="admin-btn cancel" id="closeModal">Cancel</button>
        </div>

      </form>
    </div>
  </div>

  <!-- links the javascript file - no type module needed since no firebase -->
  <script src="menu.js"></script>

</body>
</html>
