<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page CampusGrab.ph Title</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="container">

    <div class="left">
      <img src="images/mascot.png" alt="rawr">
      <h2>Login</h2>
      <form id="loginForm">
        <label for="login">Email or Phone:</label>
        <input type="text" id="email" name="email" placeholder="Enter email" required>
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required>
        <button type="submit">Enter</button>
      </form>
      <p><a href="forgot-password">Forgot Password?</a> | <a href="signup.html">Sign Up</a></p>
    </div>

    <div class="right">
      <h1>Campus Canteen Grab</h1>
      <p>Hungry? You've come to the right place. Browse our menu and order now!</p>
    </div>

  </div>
<script src="script.js"></script>
</body>
</html>
